name: CI

on:
  pull_request:
  push:
    branches: [main, master, work]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Type/content check
        run: npm run check

      - name: Build site
        run: npm run build

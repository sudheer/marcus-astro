name: CI

on:
  pull_request:
  push:
    branches: [main, master, dev, work]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Astro
        uses: withastro/action@v3
        with:
          path: .
          node-version: 20

      - name: Type/content check
        run: npm run check

      - name: Build site
        run: npm run build

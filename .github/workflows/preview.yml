name: Preview on Pull Request

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  PAGES_BRANCH: gh-pages

jobs:
  preview-deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_TARGET: pr
      DEPLOY_PREVIEW_PATH: pr-${{ github.event.pull_request.number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Deploy PR preview to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: ${{ env.PAGES_BRANCH }}
          folder: dist
          target-folder: preview/pr-${{ github.event.pull_request.number }}
          clean: true

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const url = `https://${context.repo.owner}.github.io/${context.repo.repo}/preview/pr-${pr}/`;
            const body = [
              '🔍 PR preview is ready.',
              '',
              `**Open preview:** ${url}`,
              '',
              '_If the URL is not yet live, wait 1-2 minutes and refresh._'
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              body
            });

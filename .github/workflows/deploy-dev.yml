name: Deploy development site

on:
  push:
    branches: [dev]
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch/tag/SHA to deploy as preview'
        required: false
        default: 'dev'

permissions:
  contents: write

env:
  PAGES_BRANCH: gh-pages

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_TARGET: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || 'dev' }}

      - name: Setup Astro
        uses: withastro/action@v3
        with:
          path: .
          node-version: 20

      - name: Build development preview site
        run: npm run build

      - name: Add .nojekyll for GitHub Pages
        run: touch dist/.nojekyll

      - name: Deploy to pages branch /preview
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: ${{ env.PAGES_BRANCH }}
          folder: dist
          target-folder: preview
          clean: true
